<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pole Span MR Calculator</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <h1>Pole Span MR Calculator</h1>
      </div>
      <div class="topbar-actions">
        <label class="btn btn-primary file-btn">
          Import Raw Excel
          <input id="excelFileInput" type="file" accept=".xlsx,.csv" hidden />
        </label>
        <label class="btn file-btn">
          Update Data
          <input id="updateExcelFileInput" type="file" accept=".xlsx,.csv" hidden />
        </label>
        <button id="saveLocalBtn" class="btn" type="button">Save</button>
        <button id="loadLocalBtn" class="btn" type="button">Load</button>
      </div>
    </header>

    <main class="layout" id="appLayout">
      <section class="content">
        <nav class="view-tabs" aria-label="Vistas de la calculadora">
          <button class="view-tab active" type="button" data-view-tab="calculator">Calculator</button>
          <button class="view-tab" type="button" data-view-tab="poleClass">Pole Type Check</button>
        </nav>

        <section class="panel index-panel" data-view-panel="calculator">
          <div class="panel-header split">
            <div>
              <p class="eyebrow">Index</p>
              <h2>Poles</h2>
              <p id="projectMeta" class="muted">No file imported</p>
            </div>
            <div class="index-actions">
              <button id="autoCalculateBtn" class="btn btn-primary" type="button">Auto Calculate Moves</button>
              <button id="exportProposedJsonBtn" class="btn btn-success" type="button">Export Proposed</button>
            </div>
          </div>
          <div class="toolbar compact-toolbar">
            <input id="poleSearchInput" class="input" type="search" placeholder="Search pole or owner..." />
            <select id="warningFilterSelect" class="input">
              <option value="all">All</option>
              <option value="warnings">Flagged only</option>
              <option value="changed">Changed / proposed only</option>
            </select>
          </div>
          <div id="polesList" class="pole-index-links"></div>
        </section>

        <section class="panel clearance-panel" data-view-panel="calculator">
          <div class="panel-header split">
            <div>
              <p class="eyebrow">Configuration</p>
              <h2>Calculation Values</h2>
            </div>
            <p class="muted">Edit these values to recalculate poles, flagging and MR.</p>
          </div>
          <div id="clearanceSettings" class="clearance-settings compact"></div>
        </section>

        <section class="panel hero-panel" data-view-panel="calculator">
          <div id="polesOverview" class="cards-grid"></div>
        </section>

        <section class="panel pole-class-panel hidden" data-view-panel="poleClass">
          <div class="panel-header split">
            <div>
              <p class="eyebrow">Pole Type Check</p>
              <h2>Height / Class Review</h2>
              <p class="muted">Uses Collection Tip, Circumference and Type against ANSI O5.1-2015.</p>
            </div>
          </div>
          <div id="poleClassResults"></div>
        </section>

      </section>
    </main>
  </div>

  <div id="toastHost" class="toast-host"></div>

  <button id="openCalculatorBtn" class="floating-open-btn" type="button">ft/in</button>
  <section id="floatingCalculator" class="floating-calculator hidden" aria-label="Feet and inches calculator">
    <div class="floating-header">
      <div>
        <p class="eyebrow">Calculator</p>
        <h3>Feet / Inches</h3>
      </div>
      <button id="closeCalculatorBtn" class="icon-btn" type="button" aria-label="Close calculator">×</button>
    </div>
    <div class="calc-grid">
      <label>Value A<input id="calcA" class="input" placeholder="24'6&quot;" /></label>
      <label>Operation
        <select id="calcOperation" class="input">
          <option value="add">A + B</option>
          <option value="subtract">A - B</option>
          <option value="toDecimal">A to decimal ft</option>
          <option value="fromDecimal">A decimal ft to ft/in</option>
          <option value="inchesToHeight">A inches to ft/in</option>
        </select>
      </label>
      <label>Value B<input id="calcB" class="input" placeholder="1'8&quot;" /></label>
      <button id="runCalculatorBtn" class="btn btn-primary" type="button">Calculate</button>
      <div class="calc-result" id="calcResult">Result</div>
    </div>
  </section>

  <script src="libs/xlsx.full.min.js"></script>
  <script src="js/height-utils.js"></script>
  <script src="js/project-config.js"></script>
  <script src="js/state.js"></script>
  <script src="js/calculations.js"></script>
  <script src="js/midspan.js"></script>
  <script src="js/mr-logic.js"></script>
  <script src="js/validations.js"></script>
  <script src="js/excel-import.js"></script>
  <script src="js/json-export.js"></script>
  <script src="js/floating-calculator.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
